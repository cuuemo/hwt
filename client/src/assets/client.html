<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
    <title>HWT Client</title>
    <link rel="stylesheet" href="/assets/style.css"/>
</head>
<body>
<button class="lang-btn" onclick="toggleLang()" data-i18n="lang.toggle"></button>
<div class="container client-page">
    <div class="header">
        <h1 data-i18n="client.title">HWT Client</h1>
        <div class="system-status">
            <span class="status-indicator" id="statusDot"></span>
            <span id="statusText" data-i18n="client.initializing">Initializing</span>
            <span id="currentTime"></span>
        </div>
    </div>

    <div class="card status-card">
        <h3 data-i18n="client.status_heading">Status</h3>
        <table>
            <tr><td data-i18n="client.connection">Connection</td><td id="connStatus"><span class="status-tag status-pending" data-i18n="client.searching">Searching</span></td></tr>
            <tr><td data-i18n="client.authorization">Authorization</td><td id="authStatus"><span class="status-tag status-pending" data-i18n="client.pending">Pending</span></td></tr>
            <tr><td data-i18n="client.cleanup">Cleanup</td><td id="cleanupStatus">--</td></tr>
            <tr><td data-i18n="client.heartbeat">Heartbeat</td><td id="heartbeatStatus">--</td></tr>
        </table>
    </div>

    <div class="card log-card">
        <h3 data-i18n="client.log_heading">Log</h3>
        <div class="log-area empty" id="logArea" data-i18n-empty="client.no_logs" data-empty="Waiting for events..."></div>
    </div>
</div>
<script src="/assets/common.js"></script>
<script>
    applyI18n();
    var logArea = document.getElementById('logArea');

    function setTag(elId, text, cls) {
        document.getElementById(elId).innerHTML = '<span class="status-tag ' + cls + '">' + esc(text) + '</span>';
    }

    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function handleEvent(event) {
        switch (event.type) {
            case 'InitialState':
            case 'StatusChanged':
                if (event.connection) {
                    var conn = event.connection;
                    if (conn.indexOf('connected') >= 0) {
                        setTag('connStatus', conn, 'status-valid');
                        document.getElementById('statusDot').className = 'status-indicator online';
                        document.getElementById('statusText').textContent = t('client.connected');
                    } else if (conn === 'searching') {
                        setTag('connStatus', t('client.searching'), 'status-pending');
                        document.getElementById('statusDot').className = 'status-indicator offline';
                        document.getElementById('statusText').textContent = t('client.searching');
                    } else {
                        setTag('connStatus', conn, 'status-error');
                        document.getElementById('statusDot').className = 'status-indicator offline';
                        document.getElementById('statusText').textContent = t('client.disconnected');
                    }
                }
                if (event.auth) {
                    var auth = event.auth;
                    if (auth === 'authorized') {
                        setTag('authStatus', t('dash.authorized'), 'status-valid');
                    } else if (auth === 'pending') {
                        setTag('authStatus', t('client.pending'), 'status-pending');
                    } else {
                        setTag('authStatus', auth, 'status-error');
                    }
                }
                if (event.heartbeat) {
                    document.getElementById('heartbeatStatus').textContent = event.heartbeat;
                }
                break;
            case 'CleanupResult':
                var text = 'Scanned: ' + event.scanned + ', Removed: ' + event.removed;
                if (event.registry_cleaned > 0) text += ', Registry: ' + event.registry_cleaned;
                if (event.ids_randomized) text += ', IDs randomized';
                document.getElementById('cleanupStatus').textContent = text;
                break;
            case 'Log':
                appendLog(logArea, event.timestamp, event.level, event.message);
                break;
        }
    }

    fetch('/api/state').then(function(r){return r.json()}).then(handleEvent).catch(function(){});

    connectWS(handleEvent);
    updateCurrentTime(document.getElementById('currentTime'));
</script>
</body>
</html>
