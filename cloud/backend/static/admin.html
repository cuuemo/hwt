<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HWT 管理后台</title>
<script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
#login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); width: 360px; }
.login-box h2 { margin-bottom: 24px; text-align: center; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-size: 14px; }
.form-group input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
.btn { width: 100%; padding: 10px; background: #1677ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
.btn:hover { background: #0958d9; }
.btn:disabled { background: #aaa; cursor: not-allowed; }
#error-msg { color: red; font-size: 13px; margin-top: 10px; text-align: center; }

#app { display: none; }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: #001529; color: #fff; padding-top: 20px; }
.sidebar h3 { padding: 0 20px 20px; font-size: 16px; border-bottom: 1px solid #ffffff22; }
.sidebar nav a { display: block; padding: 12px 20px; color: #ffffffaa; text-decoration: none; font-size: 14px; }
.sidebar nav a:hover, .sidebar nav a.active { background: #1677ff; color: #fff; }
.sidebar .logout { position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 20px; }
.sidebar .logout button { width: 100%; padding: 8px; background: transparent; border: 1px solid #ffffff44; color: #ffffffaa; border-radius: 4px; cursor: pointer; }
.main { margin-left: 200px; padding: 24px; }
.main h2 { margin-bottom: 20px; }

.toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.toolbar input, .toolbar select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
.toolbar .btn-sm { width: auto; padding: 6px 16px; font-size: 13px; }

table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
th, td { padding: 10px 14px; text-align: left; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
th { background: #fafafa; font-weight: 600; }
tr:last-child td { border-bottom: none; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
.badge-pending { background: #fff7e6; color: #d46b08; }
.badge-active { background: #f6ffed; color: #389e0d; }
.badge-disabled { background: #fff1f0; color: #cf1322; }
.badge-unbound { background: #f5f5f5; color: #888; }
.btn-link { background: none; border: none; color: #1677ff; cursor: pointer; font-size: 13px; padding: 0 4px; }
.btn-link:hover { text-decoration: underline; }
.btn-link.danger { color: #cf1322; }

.pagination { display: flex; gap: 8px; margin-top: 16px; align-items: center; justify-content: flex-end; }
.pagination button { padding: 4px 10px; border: 1px solid #ddd; background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
.pagination button.active { background: #1677ff; color: #fff; border-color: #1677ff; }
.pagination button:disabled { opacity: .5; cursor: not-allowed; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 8px; padding: 28px; width: 420px; max-width: 95vw; }
.modal h3 { margin-bottom: 20px; }
.modal .form-group { margin-bottom: 14px; }
.modal .form-group label { font-size: 13px; margin-bottom: 4px; }
.modal .form-group input, .modal .form-group select { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.modal-footer .btn { width: auto; padding: 7px 20px; font-size: 13px; }
.btn-cancel { background: #fff; color: #333; border: 1px solid #ddd; border-radius: 4px; padding: 7px 20px; cursor: pointer; font-size: 13px; }
.btn-cancel:hover { background: #f5f5f5; }

.stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card { background: #fff; border-radius: 8px; padding: 20px 28px; box-shadow: 0 1px 4px rgba(0,0,0,.08); flex: 1; min-width: 140px; }
.stat-card .num { font-size: 28px; font-weight: 700; color: #1677ff; }
.stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login-page">
  <div class="login-box">
    <h2>HWT 管理后台</h2>
    <div class="form-group">
      <label>用户名</label>
      <input id="login-username" type="text" placeholder="admin" />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input id="login-password" type="password" placeholder="密码" />
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">登录</button>
    <div id="error-msg"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div class="sidebar">
    <h3>HWT 管理后台</h3>
    <nav>
      <a href="#" class="active" onclick="showPage('users', this)">用户管理</a>
      <a href="#" onclick="showPage('bindings', this)">机器绑定</a>
      <a href="#" onclick="showPage('logs', this)">操作日志</a>
    </nav>
    <div class="logout"><button onclick="logout()">退出登录</button></div>
  </div>
  <div class="main">
    <div id="page-users"></div>
    <div id="page-bindings" style="display:none"></div>
    <div id="page-logs" style="display:none"></div>
  </div>
</div>

<!-- 编辑用户 Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>编辑用户</h3>
    <div class="form-group"><label>状态</label>
      <select id="edit-status">
        <option value="pending">待审核</option>
        <option value="active">已激活</option>
        <option value="disabled">已禁用</option>
      </select>
    </div>
    <div class="form-group"><label>授权类型</label>
      <select id="edit-license">
        <option value="">无</option>
        <option value="monthly">月付</option>
        <option value="yearly">年付</option>
        <option value="permanent">永久</option>
      </select>
    </div>
    <div class="form-group"><label>授权到期 (留空=永久)</label>
      <input id="edit-expire" type="date" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn" onclick="saveUser()">保存</button>
    </div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('hwt_token') || '';
let editingUserId = null;

// ── RSA 加密 (forge, 兼容 HTTP) ───────────────────────────
function rsaEncrypt(pemKey, plaintext) {
  const pub = forge.pki.publicKeyFromPem(pemKey);
  const enc = pub.encrypt(forge.util.encodeUtf8(plaintext), 'RSA-OAEP', { md: forge.md.sha256.create() });
  return btoa(enc);
}

// ── API helpers ───────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

// ── 登录 ──────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  if (!username || !password) { err.textContent = '请输入用户名和密码'; return; }
  btn.disabled = true; btn.textContent = '登录中...'; err.textContent = '';
  try {
    const pkRes = await fetch(API + '/api/auth/public-key');
    const { public_key } = await pkRes.json();
    const password_encrypted = rsaEncrypt(public_key, password);
    const data = await api('POST', '/api/auth/login', { username, password_encrypted });
    if (!data || !data.access_token) { err.textContent = data?.detail || '登录失败'; return; }
    token = data.access_token;
    localStorage.setItem('hwt_token', token);
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadUsers();
  } catch(e) { err.textContent = '网络错误'; }
  finally { btn.disabled = false; btn.textContent = '登录'; }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function logout() {
  token = ''; localStorage.removeItem('hwt_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

// ── 页面切换 ──────────────────────────────────────────────
function showPage(name, el) {
  ['users','bindings','logs'].forEach(p => document.getElementById('page-'+p).style.display = 'none');
  document.getElementById('page-'+name).style.display = 'block';
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  if (name === 'users') loadUsers();
  else if (name === 'bindings') loadBindings();
  else if (name === 'logs') loadLogs();
}

// ── 用户管理 ──────────────────────────────────────────────
let userPage = 1, userTotal = 0;
async function loadUsers(page) {
  if (page) userPage = page;
  const status = document.getElementById('filter-status')?.value || '';
  const username = document.getElementById('filter-username')?.value || '';
  const params = new URLSearchParams({ page: userPage, size: 20 });
  if (status) params.set('status', status);
  if (username) params.set('username', username);
  const data = await api('GET', '/api/admin/users?' + params);
  if (!data) return;
  userTotal = data.total;
  const el = document.getElementById('page-users');
  el.innerHTML = `
    <h2>用户管理 <span style="font-size:14px;color:#888;font-weight:400">共 ${data.total} 条</span></h2>
    <div class="toolbar">
      <input id="filter-username" placeholder="搜索用户名" value="${username}" onkeydown="if(event.key==='Enter')loadUsers(1)" />
      <select id="filter-status" onchange="loadUsers(1)">
        <option value="">全部状态</option>
        <option value="pending" ${status==='pending'?'selected':''}>待审核</option>
        <option value="active" ${status==='active'?'selected':''}>已激活</option>
        <option value="disabled" ${status==='disabled'?'selected':''}>已禁用</option>
      </select>
      <button class="btn btn-sm" onclick="loadUsers(1)">搜索</button>
    </div>
    <table>
      <thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>状态</th><th>授权</th><th>到期</th><th>注册时间</th><th>操作</th></tr></thead>
      <tbody>${data.items.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.username}</td>
          <td>${u.email||'-'}</td>
          <td><span class="badge badge-${u.status}">${{pending:'待审核',active:'已激活',disabled:'已禁用'}[u.status]||u.status}</span></td>
          <td>${u.license_type||'-'}</td>
          <td>${u.license_expire_at?u.license_expire_at.slice(0,10):'永久'}</td>
          <td>${u.created_at?u.created_at.slice(0,10):'-'}</td>
          <td>
            <button class="btn-link" onclick="openEdit(${u.id},'${u.status}','${u.license_type||''}','${u.license_expire_at?u.license_expire_at.slice(0,10):''}')">编辑</button>
            ${u.status==='pending'?`<button class="btn-link" onclick="quickApprove(${u.id})">审核通过</button>`:''}
            ${u.status==='active'?`<button class="btn-link danger" onclick="quickDisable(${u.id})">禁用</button>`:''}
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
    ${renderPager(userPage, Math.ceil(userTotal/20), 'loadUsers')}
  `;
}

function openEdit(id, status, license, expire) {
  editingUserId = id;
  document.getElementById('edit-status').value = status;
  document.getElementById('edit-license').value = license;
  document.getElementById('edit-expire').value = expire;
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

async function saveUser() {
  const body = {
    status: document.getElementById('edit-status').value,
    license_type: document.getElementById('edit-license').value || null,
    license_expire_at: document.getElementById('edit-expire').value || null,
  };
  await api('PATCH', `/api/admin/users/${editingUserId}`, body);
  closeModal(); loadUsers();
}

async function quickApprove(id) {
  await api('PATCH', `/api/admin/users/${id}`, { status: 'active' });
  loadUsers();
}
async function quickDisable(id) {
  if (!confirm('确认禁用该用户？')) return;
  await api('PATCH', `/api/admin/users/${id}`, { status: 'disabled' });
  loadUsers();
}

// ── 机器绑定 ──────────────────────────────────────────────
let bindPage = 1;
async function loadBindings(page) {
  if (page) bindPage = page;
  const uid = document.getElementById('filter-uid')?.value || '';
  const params = new URLSearchParams({ page: bindPage, size: 20 });
  if (uid) params.set('user_id', uid);
  const data = await api('GET', '/api/admin/bindings?' + params);
  if (!data) return;
  const el = document.getElementById('page-bindings');
  el.innerHTML = `
    <h2>机器绑定 <span style="font-size:14px;color:#888;font-weight:400">共 ${data.total} 条</span></h2>
    <div class="toolbar">
      <input id="filter-uid" placeholder="用户ID" value="${uid}" style="width:120px" onkeydown="if(event.key==='Enter')loadBindings(1)" />
      <button class="btn btn-sm" onclick="loadBindings(1)">搜索</button>
    </div>
    <table>
      <thead><tr><th>ID</th><th>用户ID</th><th>用户名</th><th>机器码</th><th>绑定时间</th><th>最后验证</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>${data.items.map(b => `
        <tr>
          <td>${b.id}</td>
          <td>${b.user_id}</td>
          <td>${b.username||'-'}</td>
          <td style="font-family:monospace;font-size:12px">${b.machine_code.slice(0,16)}...</td>
          <td>${b.bound_at?b.bound_at.slice(0,10):'-'}</td>
          <td>${b.last_verified_at?b.last_verified_at.slice(0,10):'-'}</td>
          <td><span class="badge badge-${b.status}">${b.status==='active'?'绑定中':'已解绑'}</span></td>
          <td>${b.status==='active'?`<button class="btn-link danger" onclick="unbind(${b.id})">解绑</button>`:'-'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    ${renderPager(bindPage, Math.ceil(data.total/20), 'loadBindings')}
  `;
}

async function unbind(id) {
  if (!confirm('确认解绑该机器？')) return;
  await api('DELETE', `/api/admin/bindings/${id}`);
  loadBindings();
}

// ── 操作日志 ──────────────────────────────────────────────
let logPage = 1;
async function loadLogs(page) {
  if (page) logPage = page;
  const username = document.getElementById('filter-log-user')?.value || '';
  const action = document.getElementById('filter-log-action')?.value || '';
  const params = new URLSearchParams({ page: logPage, size: 50 });
  if (username) params.set('username', username);
  if (action) params.set('action', action);
  const data = await api('GET', '/api/admin/logs?' + params);
  if (!data) return;
  const el = document.getElementById('page-logs');
  el.innerHTML = `
    <h2>操作日志 <span style="font-size:14px;color:#888;font-weight:400">共 ${data.total} 条</span></h2>
    <div class="toolbar">
      <input id="filter-log-user" placeholder="用户名" value="${username}" onkeydown="if(event.key==='Enter')loadLogs(1)" />
      <select id="filter-log-action" onchange="loadLogs(1)">
        <option value="">全部操作</option>
        <option value="login" ${action==='login'?'selected':''}>登录</option>
        <option value="register" ${action==='register'?'selected':''}>注册</option>
        <option value="verify" ${action==='verify'?'selected':''}>验证</option>
        <option value="unbind" ${action==='unbind'?'selected':''}>解绑</option>
      </select>
      <button class="btn btn-sm" onclick="loadLogs(1)">搜索</button>
    </div>
    <table>
      <thead><tr><th>ID</th><th>用户名</th><th>操作</th><th>IP</th><th>结果</th><th>详情</th><th>时间</th></tr></thead>
      <tbody>${data.items.map(l => `
        <tr>
          <td>${l.id}</td>
          <td>${l.username||'-'}</td>
          <td>${l.action}</td>
          <td>${l.ip_address||'-'}</td>
          <td><span class="badge ${l.result==='success'?'badge-active':'badge-disabled'}">${l.result==='success'?'成功':'失败'}</span></td>
          <td style="color:#888;font-size:12px">${l.detail||'-'}</td>
          <td>${l.created_at?l.created_at.slice(0,19).replace('T',' '):'-'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    ${renderPager(logPage, Math.ceil(data.total/50), 'loadLogs')}
  `;
}

// ── 分页 ──────────────────────────────────────────────────
function renderPager(current, total, fn) {
  if (total <= 1) return '';
  let html = '<div class="pagination">';
  html += `<button ${current<=1?'disabled':''} onclick="${fn}(${current-1})">上一页</button>`;
  for (let i = Math.max(1,current-2); i <= Math.min(total,current+2); i++) {
    html += `<button class="${i===current?'active':''}" onclick="${fn}(${i})">${i}</button>`;
  }
  html += `<button ${current>=total?'disabled':''} onclick="${fn}(${current+1})">下一页</button>`;
  html += '</div>';
  return html;
}

// ── 初始化 ────────────────────────────────────────────────
if (token) {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadUsers();
}
</script>
</body>
</html>
