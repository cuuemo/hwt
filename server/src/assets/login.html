<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
    <title>Net Admin Server - Login</title>
    <link rel="stylesheet" href="/assets/style.css"/>
</head>
<body>
<button class="lang-btn" onclick="toggleLang()" data-i18n="lang.toggle"></button>
<div class="container login-page">
    <div class="header">
        <h1 data-i18n="login.title">Net Admin Server</h1>
        <div class="system-status"><span>V1.0</span></div>
    </div>
    <div class="card form-card">
        <h3 data-i18n="login.heading">Login</h3>
        <div class="machine-code" id="machineCode">loading...</div>
        <div class="form-group">
            <label data-i18n="login.account">Account</label>
            <input type="text" id="username" data-i18n-ph="login.ph_account" placeholder="Enter account" autocomplete="username"/>
        </div>
        <div class="form-group">
            <label data-i18n="login.password">Password</label>
            <input type="password" id="password" data-i18n-ph="login.ph_password" placeholder="Enter password" autocomplete="current-password"/>
        </div>
        <div class="form-error" id="error"></div>
        <button id="loginBtn" onclick="doLogin()" data-i18n="login.btn">Login</button>
        <div class="form-link"><a href="/register" data-i18n="login.no_account">No account? Register now</a></div>
    </div>
</div>
<div class="loading-overlay" id="loading"><div class="loader"></div></div>
<script src="/assets/common.js"></script>
<script>
    applyI18n();

    fetch('/api/state').then(function(r){return r.json()}).then(function(s) {
        var mc = s.machine_code || '';
        document.getElementById('machineCode').textContent = mc.length > 32 ? mc.substring(0,32) + '...' : mc;
    }).catch(function(){});

    var ws = connectWS(function(event) {
        if (event.type === 'LoginResult') {
            showLoading(false);
            document.getElementById('loginBtn').disabled = false;
            if (event.success) {
                location.href = '/dashboard';
            } else {
                var err = document.getElementById('error');
                err.textContent = event.message;
                err.classList.add('show');
            }
        }
    });

    function doLogin() {
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        if (!username || !password) return;

        document.getElementById('error').classList.remove('show');
        document.getElementById('loginBtn').disabled = true;
        showLoading(true);

        fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: username, password: password})
        }).catch(function() {
            showLoading(false);
            document.getElementById('loginBtn').disabled = false;
            var err = document.getElementById('error');
            err.textContent = t('login.network_error');
            err.classList.add('show');
        });
    }

    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
    });
</script>
</body>
</html>
