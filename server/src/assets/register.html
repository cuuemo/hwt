<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
    <title>Net Admin Server - Register</title>
    <link rel="stylesheet" href="/assets/style.css"/>
</head>
<body>
<button class="lang-btn" onclick="toggleLang()" data-i18n="lang.toggle"></button>
<div class="container login-page">
    <div class="header">
        <h1 data-i18n="login.title">Net Admin Server</h1>
        <div class="system-status"><span>V1.0</span></div>
    </div>
    <div class="card form-card">
        <h3 data-i18n="reg.heading">Register</h3>
        <div class="form-group">
            <label data-i18n="reg.account">Account</label>
            <input type="text" id="username" data-i18n-ph="reg.ph_account" placeholder="2-64 chars" autocomplete="username"/>
        </div>
        <div class="form-group">
            <label data-i18n="reg.password">Password</label>
            <input type="password" id="password" data-i18n-ph="reg.ph_password" placeholder="At least 6 chars" autocomplete="new-password"/>
        </div>
        <div class="form-group">
            <label data-i18n="reg.confirm">Confirm Password</label>
            <input type="password" id="password2" data-i18n-ph="reg.ph_confirm" placeholder="Re-enter password" autocomplete="new-password"/>
        </div>
        <div class="form-error" id="error"></div>
        <div class="form-error" id="success" style="color:#86efac"></div>
        <button id="regBtn" onclick="doRegister()" data-i18n="reg.btn">Register</button>
        <div class="form-link"><a href="/" data-i18n="reg.has_account">Already have an account? Login</a></div>
    </div>
</div>
<div class="loading-overlay" id="loading"><div class="loader"></div></div>
<script src="/assets/common.js"></script>
<script>
    applyI18n();

    var ws = connectWS(function(event) {
        if (event.type === 'RegisterResult') {
            showLoading(false);
            document.getElementById('regBtn').disabled = false;
            if (event.success) {
                document.getElementById('error').classList.remove('show');
                var s = document.getElementById('success');
                s.textContent = event.message;
                s.classList.add('show');
            } else {
                document.getElementById('success').classList.remove('show');
                var err = document.getElementById('error');
                err.textContent = event.message;
                err.classList.add('show');
            }
        }
    });

    function doRegister() {
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var password2 = document.getElementById('password2').value;
        var err = document.getElementById('error');

        if (username.length < 2) { err.textContent = t('reg.err_short_user'); err.classList.add('show'); return; }
        if (password.length < 6) { err.textContent = t('reg.err_short_pass'); err.classList.add('show'); return; }
        if (password !== password2) { err.textContent = t('reg.err_mismatch'); err.classList.add('show'); return; }

        err.classList.remove('show');
        document.getElementById('success').classList.remove('show');
        document.getElementById('regBtn').disabled = true;
        showLoading(true);

        fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: username, password: password})
        }).catch(function() {
            showLoading(false);
            document.getElementById('regBtn').disabled = false;
            err.textContent = t('reg.network_error');
            err.classList.add('show');
        });
    }

    document.getElementById('password2').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doRegister();
    });
</script>
</body>
</html>
