<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
    <title>Net Admin Server - Dashboard</title>
    <link rel="stylesheet" href="/assets/style.css"/>
</head>
<body>
<div class="container dashboard">
    <div class="header">
        <h1>Net Admin Server</h1>
        <div class="system-status">
            <span class="status-indicator online" id="statusDot"></span>
            <span id="statusText">Running</span>
            <span id="currentTime"></span>
        </div>
    </div>

    <div class="card status-card">
        <h3>Authorization</h3>
        <table>
            <tr><td>Status</td><td id="authStatus">--</td></tr>
            <tr><td>License</td><td id="licenseType">--</td></tr>
            <tr><td>Expires</td><td id="expireAt">--</td></tr>
            <tr><td>Machine Code</td><td id="machineCode" style="word-break:break-all;font-size:12px;">--</td></tr>
            <tr><td>Last Verified</td><td id="lastVerify">--</td></tr>
        </table>
    </div>

    <div class="card clients-card">
        <h3>Online Clients (<span id="clientCount">0</span>)</h3>
        <table>
            <thead><tr><th>IP</th><th>Client ID</th><th>Connected</th></tr></thead>
            <tbody id="clientsBody"></tbody>
        </table>
    </div>

    <div class="card log-card">
        <h3>Log</h3>
        <div class="log-area empty" id="logArea" data-empty="No logs yet"></div>
    </div>
</div>
<script src="/assets/common.js"></script>
<script>
    var logArea = document.getElementById('logArea');

    function updateAuthUI(data) {
        var authEl = document.getElementById('authStatus');
        if (data.authorized) {
            authEl.innerHTML = '<span class="status-tag status-valid">Authorized</span>';
            document.getElementById('statusDot').className = 'status-indicator online';
        } else {
            authEl.innerHTML = '<span class="status-tag status-error">Not Authorized</span>';
            document.getElementById('statusDot').className = 'status-indicator offline';
        }
        document.getElementById('licenseType').textContent = data.license_type || '--';
        document.getElementById('expireAt').textContent = data.expire_at || 'Permanent';
        if (data.machine_code) document.getElementById('machineCode').textContent = data.machine_code;
        if (data.last_verify_time) document.getElementById('lastVerify').textContent = data.last_verify_time;
    }

    function updateClientsUI(clients) {
        document.getElementById('clientCount').textContent = clients.length;
        var body = document.getElementById('clientsBody');
        body.innerHTML = '';
        clients.forEach(function(c) {
            var tr = document.createElement('tr');
            tr.innerHTML = '<td>' + esc(c.ip) + '</td><td>' + esc(c.client_id) + '</td><td>' + esc(c.connected_at) + '</td>';
            body.appendChild(tr);
        });
    }

    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // Initial state
    fetch('/api/state').then(r=>r.json()).then(function(s) {
        updateAuthUI(s);
        updateClientsUI(s.clients || []);
    });

    // WebSocket
    connectWS(function(event) {
        switch (event.type) {
            case 'InitialState':
                updateAuthUI(event);
                updateClientsUI(event.clients || []);
                break;
            case 'AuthStatusChanged':
                updateAuthUI(event);
                break;
            case 'ClientListChanged':
                updateClientsUI(event.clients || []);
                break;
            case 'Log':
                appendLog(logArea, event.timestamp, event.level, event.message);
                break;
        }
    });

    updateCurrentTime(document.getElementById('currentTime'));
</script>
</body>
</html>
